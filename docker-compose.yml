services:
  backend:
    build: ./back-end
    image: nishadzc/curd-backend:1.0.0
    restart: unless-stopped
    env_file:
      - ./back-end/.env
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); const req = http.get('http://127.0.0.1:3001/health', res => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    image: nishadzc/curd-frontend:1.0.0
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "8000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - backend